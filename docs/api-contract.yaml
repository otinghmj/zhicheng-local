  # ── 脚本执行 ────────────────────────────────────────────────────────────

  /api/scripts/{name}:
    post:
      summary: 执行已有脚本
      description: |
        通过 child_process 调用已有 .mjs 脚本。
        脚本异步执行，立即返回 jobId。
        通过 SSE `/api/events` 推送执行进度和结果。
        同一脚本不允许并行执行。
      tags: [Scripts]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            enum:
              - generate-pdf    # node generate-pdf.mjs
              - 51job-opencli   # node scrapers/51job/51job-opencli.mjs
              - liepin-dom      # node scrapers/liepin/liepin-dom.mjs
      requestBody:
        description: 脚本参数（可选）
        content:
          application/json:
            schema:
              type: object
              properties:
                args:
                  type: array
                  items:
                    type: string
                  description: 传递给脚本的命令行参数
                dryRun:
                  type: boolean
                  default: false
                  description: 是否以 --dry-run 模式执行
      responses:
        '202':
          description: 脚本已开始异步执行
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScriptExecution'
        '409':
          description: 该脚本正在运行中
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: 取消运行中的脚本任务
      x-effective-route: /api/scripts/{jobId}
      description: |
        本操作对应 `DELETE /api/scripts/{jobId}`。
        OpenAPI 路径模板与同路径 POST 共用 `{name}` 占位名；DELETE 时该值按 jobId 解释并终止对应进程。
      tags: [Scripts]
      parameters:
        - name: name
          in: path
          required: true
          description: DELETE 请求中按 jobId 解释
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 已发送终止信号
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScriptExecution'
        '404':
          $ref: '#/components/responses/404'

  /api/scripts/{jobId}/status:
    get:
      summary: 查询脚本执行状态
      tags: [Scripts]
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScriptExecution'
        '404':
          $ref: '#/components/responses/404'

  # ── Claude headless AI 任务 ─────────────────────────────────────────────

  /api/ai-tasks:
    post:
      summary: 启动 Claude headless AI 任务
      description: |
        根据 mode 白名单读取对应的 modes/{mode}.md，以 target 和 args 组装任务输入。
        执行方式使用 `claude -p` headless 调用，参照 batch/batch-runner.sh 的现有 worker 模式。
        全局并发数固定为 1；已有 AI 任务运行时返回 409 Conflict。
        创建后立即返回 jobId。任务状态复用 GET `/api/scripts/{jobId}/status`；
        进度、完成和失败事件复用 GET `/api/events` 中的
        `script-progress`、`script-completed`、`script-failed` SSE 事件。
      tags: [AITasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiTaskRequest'
      responses:
        '202':
          description: AI 任务已进入单并发执行队列
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiTaskAccepted'
        '409':
          description: 已有 AI 任务正在运行
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

