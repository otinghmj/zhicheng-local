  # ── SSE 事件流 ──────────────────────────────────────────────────────────

  /api/events:
    get:
      summary: SSE 事件流
      description: |
        Server-Sent Events 端点，推送以下事件类型：
        - `applications-updated`: applications.md 变更
        - `pipeline-updated`: pipeline.md 变更
        - `config-updated`: 配置文件变更（携带 filename）
        - `report-added`: 新报告文件创建
        - `batch-updated`: 批处理状态变更
        - `script-progress`: 脚本执行进度（携带 jobId + 从 ##PROGRESS 行解析的 progress）
        - `script-completed`: 脚本执行完成
        - `script-failed`: 脚本执行失败（携带 error）
        - AI 任务复用上述 `script-progress` / `script-completed` / `script-failed` 事件
        - `external-change`: 文件被非 Web 层修改
      tags: [Events]
      responses:
        '200':
          description: SSE 事件流
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: applications-updated
                  data: {"timestamp":"2026-04-28T12:00:00Z"}

                  event: script-progress
                  data: {"jobId":"abc-123","progress":{"step":"搜索翻页","current":3,"total":10,"found":42}}

# ─── 标签 ────────────────────────────────────────────────────────────────────

tags:
  - name: Applications
    description: 应用追踪表（data/applications.md）
  - name: Pipeline
    description: URL 收件箱（data/pipeline.md）
  - name: Reports
    description: 评估报告（reports/）
  - name: Config
    description: 配置管理（profile.yml / portals.yml / cv.md / _profile.md / states.yml）
  - name: ScanHistory
    description: 扫描历史（data/scan-history.tsv）
  - name: StoryBank
    description: STAR+R 故事库（interview-prep/story-bank.md）
  - name: Batch
    description: 批处理状态（batch/）
  - name: History
    description: Web 层落账历史（task-history.tsv / activity-log.tsv / metrics-history.tsv）
  - name: Scripts
    description: 脚本执行（merge / verify / scan 等）
  - name: AITasks
    description: Claude headless AI 任务（claude -p，单并发）
  - name: Files
    description: PDF 文件列表与下载/预览
  - name: InterviewPrep
    description: 面试准备产物文件（interview-prep/）
  - name: Events
    description: SSE 实时事件推送

# ─── 明确不提供 ────────────────────────────────────────────────────────────────

x-explicitly-not-provided:
  description: 防止后续会话自行发明未冻结的端点或服务端能力
  items:
    - capability: 列表搜索/筛选/排序/分页参数
      disposition: 前端过滤
      alternative: 除契约已明确存在的参数外，不新增通用列表参数；页面在已加载数据上处理
    - capability: CSV 导出
      disposition: 前端解决
      alternative: 前端对当前列表直接序列化为 CSV
    - capability: 缺失 PDF 差集
      disposition: 前端解决
      alternative: 前端组合 GET /api/reports 与 GET /api/files/pdf 计算
    - capability: 统一全局搜索
      disposition: 前端解决
      alternative: 前端 ⌘K 聚合已加载的应用、Pipeline 与报告数据
    - capability: Dashboard 聚合指标端点
      disposition: 前端解决
      alternative: 前端组合既有 applications、pipeline、reports、scan-history 与 metrics-history 端点
    - capability: 通知中心资源
      disposition: 前端解决
      alternative: 复用 GET /api/activity-log
    - capability: 环境健康端点
      disposition: 后续指令吸收
      alternative: 走 POST /api/scripts/doctor 的 --json 输出
    - capability: 简历模板管理
      disposition: 设计稿降级
      alternative: 当前仅支持 1 个固定模板，不提供模板资源端点
    - capability: 故事编辑/删除
      disposition: 二期 P2
      alternative: 1.2 仅提供 GET/POST /api/story-bank
    - capability: PDF 删除/批量 ZIP
      disposition: 二期 P2
      alternative: 1.2 仅提供 PDF 列表和单文件读取
    - capability: 报告对比结构化读取
      disposition: 二期 P2
      alternative: 1.2 可通过 POST /api/ai-tasks 生成文本结果，不承诺结构化对比端点
