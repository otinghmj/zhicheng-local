  # ── 扫描历史 ────────────────────────────────────────────────────────────

  /api/scan-history:
    get:
      summary: 获取扫描历史
      description: |
        解析 data/scan-history.tsv，支持分页。
        当 aggregate=daily 时，忽略明细分页，返回按 portal + 日期聚合的 added/skipped 计数。
      tags: [ScanHistory]
      parameters:
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/offsetParam'
        - name: since
          in: query
          schema:
            type: string
            format: date
          description: 只返回该日期之后的记录
        - name: company
          in: query
          schema:
            type: string
        - name: aggregate
          in: query
          schema:
            type: string
            enum: [daily]
          description: 设置为 daily 时返回按 portal + 日期聚合的 added/skipped 计数
      responses:
        '200':
          description: 扫描历史明细，或 aggregate=daily 时的每日聚合
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [data, total]
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ScanHistoryEntry'
                      total:
                        type: integer
                  - type: object
                    required: [data, total]
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ScanHistoryDailyAggregate'
                      total:
                        type: integer

