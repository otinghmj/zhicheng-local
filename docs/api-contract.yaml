openapi: '3.0.3'
# FROZEN: 2026-06-11
info:
  title: 职程本地版 Web API
  version: '1.2'
  description: |
    职程本地版可视化层的 RESTful API 契约。
    本仓库是本地模式独立版，不包含云端登录、JWT、公共职位库或服务端多用户数据库。
    后端读写现有 Markdown/YAML/TSV 文件系统，不引入数据库。
    所有写操作使用文件级排他锁防止竞态。
  contact:
    name: 职程
  license:
    name: MIT

servers:
  - url: http://localhost:3200
    description: 本地开发

components:

  # ─── 通用 Schemas ─────────────────────────────────────────────────────────

  schemas:

    Error:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
          description: 人类可读错误信息
        code:
          type: string
          description: 机器可识别错误码
          enum:
            - UNAUTHORIZED
            - FORBIDDEN
            - NOT_FOUND
            - CONFLICT
            - VALIDATION_ERROR
            - PARSE_ERROR
            - SCRIPT_ERROR
            - SCRIPT_TIMEOUT
            - SCRIPT_RUNNING
            - INTERNAL_ERROR
        details:
          type: object
          description: 可选的额外上下文

    ApplicationStatus:
      type: string
      enum:
        - Evaluated
        - Applied
        - Responded
        - Interview
        - Offer
        - Rejected
        - Discarded
        - SKIP

    Application:
      type: object
      required: [num, date, company, role, status, pdfGenerated]
      properties:
        num:
          type: integer
          description: 3 位零填充编号
          example: 1
        date:
          type: string
          format: date
          example: '2026-04-01'
        company:
          type: string
          example: Anthropic
        role:
          type: string
          example: AI Engineer
        score:
          type: number
          nullable: true
          minimum: 1.0
          maximum: 5.0
          example: 4.5
        scoreRaw:
          type: string
          example: '4.5/5'
        status:
          $ref: '#/components/schemas/ApplicationStatus'
        pdfGenerated:
          type: boolean
        reportPath:
          type: string
          nullable: true
          description: 相对路径
          example: reports/001-anthropic-2026-04-01.md
        reportNumber:
          type: string
          example: '001'
        notes:
          type: string
          example: Strong match
        jobUrl:
          type: string
          format: uri
          nullable: true
          readOnly: true
          description: 路由层优先使用 Pipeline URL，关联不到时使用报告 URL；均无值时为 null
        platform:
          type: string
          nullable: true
          readOnly: true
          enum: [BOSS, 猎聘, 智联, 前程无忧, 其他]
          description: 路由层根据关联的 Pipeline 或报告 URL 推断的只读来源平台
        salary:
          type: string
          nullable: true
          readOnly: true
          description: 路由层按 reportPath/jobUrl join 得到的只读派生字段；join 不到时为 null
        city:
          type: string
          nullable: true
          readOnly: true
          description: 路由层按 reportPath/jobUrl join 得到的只读派生字段；join 不到时为 null
        direction:
          type: string
          nullable: true
          readOnly: true
          description: 路由层按 reportPath/jobUrl join 得到的只读派生字段；join 不到时为 null

    ApplicationUpdate:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        status:
          $ref: '#/components/schemas/ApplicationStatus'
        notes:
          type: string

    ApplicationCreate:
      type: object
      required: [date, company, role, status]
      additionalProperties: false
      properties:
        date:
          type: string
          format: date
        company:
          type: string
        role:
          type: string
        score:
          type: number
          nullable: true
          minimum: 1.0
          maximum: 5.0
        status:
          $ref: '#/components/schemas/ApplicationStatus'
        pdfGenerated:
          type: boolean
          default: false
        reportPath:
          type: string
          nullable: true
        notes:
          type: string
        jobUrl:
          type: string
          format: uri
          nullable: true

    DashboardMetrics:
      type: object
      properties:
        total:
          type: integer
        byStatus:
          type: object
          additionalProperties:
            type: integer
        avgScore:
          type: number
        topScore:
          type: number
        withPdf:
          type: integer
        actionable:
          type: integer
        recentTrend:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              count:
                type: integer
              avgScore:
                type: number
        archetypeDistribution:
          type: object
          additionalProperties:
            type: integer

    PipelineItem:
      oneOf:
        - $ref: '#/components/schemas/PipelineParsedItem'
        - $ref: '#/components/schemas/PipelineParseError'

    PipelineParsedItem:
      type: object
      required: [ok, url, company, role, salary, city, experience, education, industry, companySize, preFilterScore, platform, processed]
      properties:
        ok:
          type: boolean
          enum: [true]
        url:
          type: string
          format: uri
        company:
          type: string
        role:
          type: string
        salary:
          type: string
        city:
          type: string
        experience:
          type: string
        education:
          type: string
        industry:
          type: string
        companySize:
          type: string
        preFilterScore:
          type: number
          minimum: 0
          maximum: 5
        platform:
          type: string
          readOnly: true
          enum: [BOSS, 猎聘, 智联, 前程无忧, 其他]
          description: URL 域名推断；zhipin→BOSS、liepin→猎聘、zhaopin→智联、51job→前程无忧
        processed:
          type: boolean
        reportNum:
          type: integer
        score:
          type: number
        pdfGenerated:
          type: boolean

    PipelineParseError:
      type: object
      required: [ok, raw, line]
      properties:
        ok:
          type: boolean
          enum: [false]
        raw:
          type: string
          description: 无法解析的原始 Markdown 行
        line:
          type: integer
          minimum: 1
          description: 原始文件中的 1-based 行号

    PipelineAddUrl:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: 待评估的职位 URL
        company:
          type: string
        role:
          type: string

    PipelinePatch:
      type: object
      additionalProperties: false
      properties:
        remove:
          type: array
          uniqueItems: true
          description: 需要移除并追写 scan-history.tsv 的 URL
          items:
            type: string
            format: uri
        updates:
          type: array
          description: 需要勾选或取消勾选的 Pipeline URL
          items:
            type: object
            required: [url, processed]
            additionalProperties: false
            properties:
              url:
                type: string
                format: uri
              processed:
                type: boolean

    EvaluationReportSummary:
      type: object
      properties:
        num:
          type: integer
        company:
          type: string
        role:
          type: string
        date:
          type: string
          format: date
        archetype:
          type: string
        score:
          type: number
        url:
          type: string
          format: uri
        pdfPath:
          type: string
        tldr:
          type: string
        remote:
          type: string
        compEstimate:
          type: string
        city:
          type: string
          nullable: true
        salary:
          type: string
          nullable: true
        postedDate:
          type: string
          format: date
          nullable: true
        trackerStatus:
          allOf:
            - $ref: '#/components/schemas/ApplicationStatus'
          nullable: true
        pdfExists:
          type: boolean
          nullable: true

    EvaluationReportDetail:
      type: object
      properties:
        num:
          type: integer
        company:
          type: string
        role:
          type: string
        date:
          type: string
          format: date
        archetype:
          type: string
        score:
          type: number
        url:
          type: string
          format: uri
        pdfPath:
          type: string
        sections:
          type: object
          properties:
            A:
              $ref: '#/components/schemas/ReportSection'
            B:
              $ref: '#/components/schemas/ReportSection'
            C:
              $ref: '#/components/schemas/ReportSection'
            D:
              $ref: '#/components/schemas/ReportSection'
            E:
              $ref: '#/components/schemas/ReportSection'
            overall:
              $ref: '#/components/schemas/ReportSection'
            nextSteps:
              $ref: '#/components/schemas/ReportSection'
        dimensions:
          type: array
          items:
            $ref: '#/components/schemas/ScoreDimension'

    ReportSection:
      type: object
      properties:
        title:
          type: string
        markdown:
          type: string
          description: 原始 Markdown 内容

    ScoreDimension:
      type: object
      properties:
        name:
          type: string
        score:
          type: number
          minimum: 1
          maximum: 5
        weight:
          type: number

    UserProfile:
      type: object
      properties:
        candidate:
          type: object
          properties:
            full_name:
              type: string
            email:
              type: string
              format: email
            phone:
              type: string
            location:
              type: string
            linkedin:
              type: string
            portfolio_url:
              type: string
              format: uri
            github:
              type: string
        target_roles:
          type: object
          properties:
            primary:
              type: array
              items:
                type: string
            archetypes:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  level:
                    type: string
                  fit:
                    type: string
                    enum: [primary, secondary, adjacent]
        narrative:
          type: object
          properties:
            headline:
              type: string
            exit_story:
              type: string
            superpowers:
              type: array
              items:
                type: string
            proof_points:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  url:
                    type: string
                    format: uri
                  hero_metric:
                    type: string
        compensation:
          type: object
          properties:
            target_range:
              type: string
            currency:
              type: string
            minimum:
              type: string
        location:
          type: object
          properties:
            country:
              type: string
            city:
              type: string
            timezone:
              type: string
            visa_status:
              type: string

    PortalConfig:
      type: object
      properties:
        title_filter:
          type: object
          properties:
            positive:
              type: array
              items:
                type: string
            negative:
              type: array
              items:
                type: string
            seniority_boost:
              type: array
              items:
                type: string
        tracked_companies:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              careers_url:
                type: string
                format: uri
              enabled:
                type: boolean
        search_queries:
          type: object
          properties:
            51job:
              type: array
              items:
                type: object
                properties:
                  query:
                    type: string
                  city:
                    type: string
            liepin:
              type: array
              items:
                type: object
                properties:
                  query:
                    type: string
                  city:
                    type: string

    MarkdownFile:
      type: object
      required: [content]
      properties:
        content:
          type: string
          description: 完整 Markdown 文本
        lastModified:
          type: string
          format: date-time

    ScanHistoryEntry:
      type: object
      required: [url, firstSeen, portal, title, company, status]
      properties:
        url:
          type: string
          format: uri
        firstSeen:
          type: string
          format: date
        portal:
          type: string
        title:
          type: string
        company:
          type: string
        status:
          type: string
          description: scan-history.tsv 中的原始状态；added 表示写入 Pipeline，skipped_* 表示跳过

    ScanHistoryDailyAggregate:
      type: object
      required: [date, portal, added, skipped]
      properties:
        date:
          type: string
          format: date
        portal:
          type: string
        added:
          type: integer
          minimum: 0
          description: 当日该 portal 下 status=added 的记录数
        skipped:
          type: integer
          minimum: 0
          description: 当日该 portal 下 status 以 skipped_ 开头的记录数

    BatchJob:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
          format: uri
        status:
          type: string
          enum: [pending, running, completed, failed]
        reportNum:
          type: string
        score:
          type: string
        error:
          type: string

    ScriptExecution:
      type: object
      properties:
        jobId:
          type: string
          format: uuid
          description: 异步任务 ID（可通过 SSE 追踪进度）
        script:
          type: string
        status:
          type: string
          enum: [started, completed, failed, canceled]
        stdout:
          type: string
        stderr:
          type: string
        exitCode:
          type: integer
          nullable: true
        progress:
          allOf:
            - $ref: '#/components/schemas/ScriptProgress'
          nullable: true
          description: 从 stdout 的 `##PROGRESS {json}` 行解析；尚无合法进度行时为 null
        logTail:
          type: string
          description: 排除 ##PROGRESS 行后的最近日志尾部

    ScriptProgress:
      type: object
      required: [step, current, total]
      properties:
        step:
          type: string
        current:
          type: integer
          minimum: 0
        total:
          type: integer
          minimum: 0
        found:
          type: integer
          minimum: 0

    AiTaskRequest:
      type: object
      required: [mode, target]
      additionalProperties: false
      properties:
        mode:
          type: string
          description: modes/ 下允许执行的真实模式文件名（不含 .md）
          enum:
            - apply
            - auto-pipeline
            - batch
            - contacto
            - cv-deep-dive
            - deep
            - deep-prep-glossary
            - deep-prep-immersion
            - deep-prep-portfolio
            - deep-prep-roleplay
            - deep-prep-simulate
            - interview-prep
            - oferta
            - ofertas
            - pdf
            - pipeline
            - pre-filter
            - project
            - scan
            - tracker
            - training
        target:
          type: string
          minLength: 1
          description: 报告编号或 URL
          example: '1247'
        args:
          type: object
          additionalProperties: true
          description: 传递给所选 mode 的可选命名参数

    AiTaskAccepted:
      type: object
      required: [jobId]
      properties:
        jobId:
          type: string
          format: uuid
          description: 复用 GET /api/scripts/{jobId}/status 和 GET /api/events 跟踪

    StoryBankStory:
      type: object
      required: [id, title, themes, source, situation, task, action, result, reflection, suitableFor]
      properties:
        id:
          type: string
          description: 由故事标题生成的稳定标识
        title:
          type: string
        themes:
          type: array
          description: 标题方括号中的主题标签
          items:
            type: string
        source:
          type: string
        situation:
          type: string
          description: STAR+R 的 S（背景）
        task:
          type: string
          description: STAR+R 的 T（任务）
        action:
          type: string
          description: STAR+R 的 A（行动）
        result:
          type: string
          description: STAR+R 的 R（结果）
        reflection:
          type: string
          description: STAR+R 的 Reflection（反思）
        suitableFor:
          type: array
          items:
            type: string

    StoryBankStoryCreate:
      type: object
      required: [title, themes, source, situation, task, action, result]
      additionalProperties: false
      properties:
        title:
          type: string
        themes:
          type: array
          minItems: 1
          items:
            type: string
        source:
          type: string
        situation:
          type: string
        task:
          type: string
        action:
          type: string
        result:
          type: string
        reflection:
          type: string
        suitableFor:
          type: array
          items:
            type: string

    TaskHistoryEntry:
      type: object
      required: [taskId, script, args, started]
      properties:
        taskId:
          type: string
        script:
          type: string
        args:
          type: string
          description: data/task-history.tsv 中保存的命令参数文本
        started:
          type: string
          format: date-time
        ended:
          type: string
          format: date-time
          nullable: true
        exitCode:
          type: integer
          nullable: true
        found:
          type: integer
          nullable: true
        dedupRate:
          type: number
          nullable: true

    ActivityLogEntry:
      type: object
      required: [ts, type, summary]
      properties:
        ts:
          type: string
          format: date-time
        type:
          type: string
        summary:
          type: string

    MetricsHistoryEntry:
      type: object
      required: [date, scanned, pending, processed, applied, interview, offers]
      properties:
        date:
          type: string
          format: date
        scanned:
          type: integer
        pending:
          type: integer
        processed:
          type: integer
        applied:
          type: integer
        interview:
          type: integer
        offers:
          type: integer

    PdfFile:
      type: object
      required: [filename, size, mtime]
      properties:
        filename:
          type: string
        size:
          type: integer
          minimum: 0
          description: 文件大小，单位 byte
        mtime:
          type: string
          format: date-time
        company:
          type: string
          nullable: true
          description: 从文件名解析；无法解析时为 null
        date:
          type: string
          format: date
          nullable: true
          description: 从文件名解析；无法解析时为 null

    InterviewPrepFile:
      type: object
      required: [slug, filename, exists, mtime]
      properties:
        slug:
          type: string
        filename:
          type: string
        exists:
          type: boolean
        mtime:
          type: string
          format: date-time
          nullable: true

    StateDefinition:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        aliases:
          type: array
          items:
            type: string
        description:
          type: string
        dashboard_group:
          type: string
        badge_variant:
          type: string
          enum: [success, info, warning, danger, primary, purple, neutral]
          description: 前端状态徽标的视觉变体，由状态元数据驱动

  # ─── 通用参数 ─────────────────────────────────────────────────────────────

  parameters:
    limitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 100
        maximum: 500
    offsetParam:
      name: offset
      in: query
      schema:
        type: integer
        default: 0

  # ─── 通用响应 ─────────────────────────────────────────────────────────────

  responses:
    '401':
      description: 未认证
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    '403':
      description: 权限不足
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    '404':
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    '409':
      description: 文件写冲突（锁超时）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

# ─── 路径 ────────────────────────────────────────────────────────────────────

paths:

  # ── 应用追踪 ────────────────────────────────────────────────────────────

  /api/applications:
    get:
      summary: 获取全部应用记录
      tags: [Applications]
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ApplicationStatus'
          description: 按状态过滤
        - name: minScore
          in: query
          schema:
            type: number
        - name: maxScore
          in: query
          schema:
            type: number
        - name: search
          in: query
          schema:
            type: string
          description: 模糊搜索 company/role
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [num, date, score, status, company]
            default: num
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: 应用列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Application'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/401'

    post:
      summary: 新增一条投递记录
      description: |
        用于手动添加或将评估报告入库 Tracker。
        仅写入 applications.md 的原生字段；salary/city/direction 是只读 join 派生字段，不接受写入。
      tags: [Applications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationCreate'
      responses:
        '201':
          description: 投递记录已新增
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '409':
          $ref: '#/components/responses/409'

  /api/applications/{num}:
    get:
      summary: 获取单条应用详情
      tags: [Applications]
      parameters:
        - name: num
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 应用详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '404':
          $ref: '#/components/responses/404'

    patch:
      summary: 更新应用状态/备注
      description: |
        PATCH 仅允许更新 status 和 notes 字段，这是应用追踪文件的设计约束。
        salary/city/direction 等 join 派生字段只读，不允许通过 PATCH 写入。
        使用文件级排他锁确保原子写入。
        如果文件被其他进程锁定，返回 409 Conflict。
      tags: [Applications]
      parameters:
        - name: num
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '404':
          $ref: '#/components/responses/404'
        '409':
          $ref: '#/components/responses/409'

  /api/applications/metrics:
    get:
      summary: 获取仪表板聚合指标
      tags: [Applications]
      responses:
        '200':
          description: 指标数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardMetrics'

  # ── 管道 ────────────────────────────────────────────────────────────────

  /api/pipeline:
    get:
      summary: 获取管道列表
      tags: [Pipeline]
      parameters:
        - name: processed
          in: query
          schema:
            type: boolean
          description: 按处理状态过滤
      responses:
        '200':
          description: 管道列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  pending:
                    type: array
                    items:
                      $ref: '#/components/schemas/PipelineItem'
                  processed:
                    type: array
                    items:
                      $ref: '#/components/schemas/PipelineItem'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/PipelineItem'

    post:
      summary: 向管道添加新 URL
      description: 追加到 pipeline.md 的待处理区
      tags: [Pipeline]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PipelineAddUrl'
      responses:
        '201':
          description: URL 已添加
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineItem'
        '409':
          $ref: '#/components/responses/409'

    patch:
      summary: 批量移除或勾选 Pipeline 行
      description: |
        按 URL 从 pipeline.md 批量移除，或修改行首 checkbox。
        每条被移除记录的 URL 同步追写 data/scan-history.tsv，状态记为 skipped_dup，防止重新采集。
      tags: [Pipeline]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PipelinePatch'
      responses:
        '200':
          description: 写入后的最新 Pipeline 解析结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  pending:
                    type: array
                    items:
                      $ref: '#/components/schemas/PipelineItem'
                  processed:
                    type: array
                    items:
                      $ref: '#/components/schemas/PipelineItem'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/PipelineItem'
        '409':
          $ref: '#/components/responses/409'

